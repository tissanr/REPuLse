[package]
name = "repulse-audio"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"

[dependencies.web-sys]
version = "0.3"
features = [
  "AudioContext",
  "AudioNode",
  "AudioParam",
  "AudioScheduledSourceNode",
  "AudioDestinationNode",
  "OscillatorNode",
  "OscillatorType",
  "GainNode",
  "BiquadFilterNode",
  "BiquadFilterType",
  "AudioBuffer",
  "AudioBufferSourceNode",
]

[profile.release]
opt-level = 3
lto = true
