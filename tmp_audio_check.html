<!doctype html>
<meta charset="utf-8">
<pre id="out">running</pre>
<script type="module">
  import distort from "http://localhost:3000/plugins/distort.js";

  const out = document.getElementById("out");

  try {
    const ctx = new OfflineAudioContext(1, 48000, 48000);
    const src = new OscillatorNode(ctx, { frequency: 220 });
    const gain = new GainNode(ctx, { gain: 0.5 });
    const nodes = distort.createNodes(ctx);

    src.connect(gain);
    gain.connect(nodes.inputNode);
    nodes.outputNode.connect(ctx.destination);
    src.start(0);
    src.stop(1);

    const rendered = await ctx.startRendering();
    const data = rendered.getChannelData(0);
    let peak = 0;
    let sum = 0;
    for (let i = 0; i < data.length; i++) {
      const v = data[i];
      peak = Math.max(peak, Math.abs(v));
      sum += v;
    }
    out.textContent = JSON.stringify({ ok: peak > 0.001, peak, mean: sum / data.length });
  } catch (error) {
    out.textContent = JSON.stringify({ ok: false, error: String(error), stack: error.stack });
  }
</script>
