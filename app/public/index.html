<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REPuLse</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
  <div id="app"></div>
  <!-- Exposes dynamic import() without going through Closure Compiler, avoiding
       the new Function() workaround that requires unsafe-eval in the CSP. -->
  <script>window.__import__ = u => import(u);</script>
  <script src="/js/main.js"></script>
</body>
</html>
